<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Prices - AgroBit Forum</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🌾</span>
                <span class="logo-text">AgroBit Forum</span>
            </a>
            <div class="nav-links" id="navLinks">
                <!-- Dynamic content based on auth state -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        <div class="market-container">
            <div class="market-header">
                <h1>📊 Market Prices</h1>
                <button class="btn btn-primary" id="reportPriceBtn" style="display: none;" onclick="openReportModal()">
                    + Report Price
                </button>
            </div>

            <!-- Filters -->
            <div class="market-filters">
                <input type="text" id="cropFilter" placeholder="🔍 Filter by crop name..." oninput="filterPrices()">
            </div>

            <!-- Prices Table -->
            <div class="market-table-wrapper">
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>Crop Name</th>
                            <th>District</th>
                            <th>Price (₹/quintal)</th>
                            <th>Reported Date</th>
                        </tr>
                    </thead>
                    <tbody id="pricesTableBody">
                        <tr>
                            <td colspan="4" class="no-prices">Loading prices...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Report Price Modal -->
    <div class="modal-overlay" id="reportModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Report Market Price</h2>
                <button class="modal-close" onclick="closeReportModal()">&times;</button>
            </div>
            <form id="reportPriceForm" class="modal-form">
                <div class="form-group">
                    <label for="cropName">Crop Name <span class="required">*</span></label>
                    <input type="text" id="cropName" required placeholder="e.g., Rice, Wheat, Cotton">
                </div>
                <div class="form-group">
                    <label for="district">District <span class="required">*</span></label>
                    <input type="text" id="district" required placeholder="e.g., Pune, Nashik">
                </div>
                <div class="form-group">
                    <label for="price">Price (₹ per quintal) <span class="required">*</span></label>
                    <input type="number" id="price" required min="1" placeholder="e.g., 2500">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeReportModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitPriceBtn">
                        <span class="btn-text">Submit</span>
                        <span class="btn-loading" style="display: none;">Submitting...</span>
                    </button>
                </div>
            </form>
            <div id="modalMessage" class="form-message"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 AgroBit Forum. Empowering Farmers Together.</p>
    </footer>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/market.js"></script>
</body>
</html>
