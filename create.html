<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - AgroSentinel Farmers Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🌾</span>
                <span class="logo-text">AgroSentinel Farmers Hub</span>
            </a>
            <div class="nav-links" id="navLinks">
                <!-- Dynamic content based on auth state -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        <div class="create-container">
            <div class="create-card">
                <h2 class="create-title">Create New Post</h2>
                <p class="create-subtitle">Share your question or experience with the community</p>

                <form id="createPostForm" class="create-form">
                    <div class="form-group">
                        <label for="postTitle">Title <span class="required">*</span></label>
                        <input type="text" id="postTitle" required placeholder="What's your question or topic?">
                    </div>

                    <div class="form-group">
                        <label for="postCategory">Category <span class="required">*</span></label>
                        <select id="postCategory" required>
                            <option value="">Select a category</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="postIssueType">Issue Type</label>
                        <input type="text" id="postIssueType" placeholder="e.g., Pest Attack, Disease, Irrigation">
                    </div>

                    <div class="form-group">
                        <label for="postDescription">Description <span class="required">*</span></label>
                        <textarea id="postDescription" rows="6" required placeholder="Describe your question or issue in detail..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="postImage">Upload Image (optional)</label>
                        <div class="image-upload-area" id="imageUploadArea">
                            <input type="file" id="postImage" accept="image/*" class="file-input">
                            <div class="upload-placeholder" id="uploadPlaceholder">
                                <span class="upload-icon">📷</span>
                                <span class="upload-text">Click to upload or drag and drop</span>
                                <span class="upload-hint">PNG, JPG up to 5MB</span>
                            </div>
                            <div class="image-preview" id="imagePreview" style="display: none;">
                                <img id="previewImg" src="" alt="Preview">
                                <button type="button" class="remove-image" id="removeImage">✕</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="index.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <span class="btn-text">Create Post</span>
                            <span class="btn-loading" style="display: none;">Creating...</span>
                        </button>
                    </div>
                </form>

                <!-- Error/Success Messages -->
                <div id="formMessage" class="form-message"></div>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/create.js"></script>
</body>
</html>
