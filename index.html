<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSentinel Farmers Hub - Agricultural Community Platform</title>
    <meta name="description" content="Connect with fellow farmers, share experiences, and get expert advice on agricultural practices.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🌱</span>
                <span class="logo-text">AgroSentinel</span>
            </a>
            <div class="nav-links" id="navLinks">
                <!-- Dynamic content based on auth state -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        <div class="page-header">
            <h1>Farmers Discussion Forum</h1>
            <p>Connect with fellow farmers, share your experiences, and discover solutions together</p>
        </div>

        <!-- Category Filter -->
        <div class="filter-section">
            <select id="categoryFilter" class="filter-select" aria-label="Filter by category">
                <option value="">All Categories</option>
            </select>
        </div>

        <!-- Posts Container -->
        <div class="posts-container" id="postsContainer">
            <div class="loading">Loading discussions...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 AgroSentinel Farmers Hub. Empowering farmers through community.</p>
    </footer>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
